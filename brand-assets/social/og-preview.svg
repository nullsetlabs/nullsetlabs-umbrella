<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Null Set Labs Open Graph preview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="slashGradient" x1="15%" y1="85%" x2="85%" y2="15%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#7d7a7a"/>
      <stop offset="100%" stop-color="#c19a5b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c19a5b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c19a5b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <circle cx="600" cy="240" r="220" fill="url(#glow)"/>

  <g transform="translate(485, 105)">
    <circle cx="115" cy="115" r="90" fill="none" stroke="#c19a5b" stroke-width="5.5"/>
    <line x1="43" y1="187" x2="187" y2="43" stroke="url(#slashGradient)" stroke-width="11" stroke-linecap="round"/>
  </g>

  <text x="600" y="430" text-anchor="middle" fill="#ededeb" font-family="Inter, system-ui, sans-serif" font-size="74" letter-spacing="3.5">
    <tspan font-weight="800">NULL SET</tspan><tspan font-weight="400" dx="10">LABS</tspan>
  </text>

  <text x="600" y="490" text-anchor="middle" fill="#c19a5b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" letter-spacing="3">FIRST PRINCIPLES  &#183;  OPEN TOOLS  &#183;  PUBLIC GOOD</text>

  <text x="600" y="555" text-anchor="middle" fill="#8a8a92" font-family="Inter, system-ui, sans-serif" font-size="22" font-style="italic" font-weight="400">A youth-led research lab building open tools across</text>
  <text x="600" y="585" text-anchor="middle" fill="#8a8a92" font-family="Inter, system-ui, sans-serif" font-size="22" font-style="italic" font-weight="400">mathematics, robotics, and the sciences.</text>
