<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Null Set Labs Food Systems and Access pillar Open Graph preview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="leafFade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c19a5b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c19a5b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c19a5b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c19a5b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <circle cx="600" cy="245" r="240" fill="url(#glow)"/>

  <!-- Leaf icon (Lucide-derived), large and centered, brass.
       Original 24x24 path scaled by ~13.3 and translated to (600,245). -->
  <g transform="translate(600 245) scale(13.3) translate(-12 -12)" fill="url(#leafFade)" stroke="#c19a5b" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.5c1 1.5.5 7-3 11.5c-2.5 3.2-6.4 4-7.2 4.9"/>
    <path d="M2 21c0-3 1.85-5.36 5.08-6" fill="none"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="430" text-anchor="middle" fill="#c19a5b" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="500" letter-spacing="6">FOOD SYSTEMS AND ACCESS</text>

  <!-- Wordmark -->
  <text x="600" y="500" text-anchor="middle" fill="#ededeb" font-family="Inter, system-ui, sans-serif" font-size="64" letter-spacing="3">
    <tspan font-weight="800">NULL SET</tspan><tspan font-weight="400" dx="10">LABS</tspan>
  </text>

  <!-- One-line description -->
  <text x="600" y="565" text-anchor="middle" fill="#8a8a92" font-family="Inter, system-ui, sans-serif" font-size="22" font-style="italic" font-weight="400">Research and tools for nutritional quality, community food systems,</text>
  <text x="600" y="595" text-anchor="middle" fill="#8a8a92" font-family="Inter, system-ui, sans-serif" font-size="22" font-style="italic" font-weight="400">and the economics of food access.</text>
</svg>
